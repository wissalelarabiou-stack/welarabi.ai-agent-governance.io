<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio GitHub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #2ea44f; } /* Couleur verte GitHub */
        p { font-size: 1.1rem; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #24292e;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #444; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bonjour, Monde ! 🚀</h1>
        <p>Bienvenue sur mon premier site hébergé via <strong>GitHub Pages</strong>.</p>
        <p>C'est un début modeste, mais le code est propre et prêt à évoluer.</p>
        <a href="https://github.com" class="btn">Voir mon profil GitHub</a>
    </div>

</body>
</html>
